<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Planner - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-card-header">
                <h2>Create Account</h2>
            </div>
            <div class="auth-card-body">
                <form id="registerForm">
                    <div class="auth-form-group">
                        <label>Username</label>
                        <input type="text" id="regUsername" required>
                    </div>
                    <div class="auth-form-group">
                        <label>Password</label>
                        <input type="password" id="regPassword" required>
                    </div>
                    <button type="submit" class="auth-submit-btn">Register</button>
                </form>
            </div>
        </div>

        <div class="auth-card">
            <div class="auth-card-header">
                <h2>Login to Your Account</h2>
            </div>
            <div class="auth-card-body">
                <form id="loginForm">
                    <div class="auth-form-group">
                        <label>Username</label>
                        <input type="text" id="loginUsername" required>
                    </div>
                    <div class="auth-form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" required>
                    </div>
                    <button type="submit" class="auth-submit-btn">Login</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            
            const response = await fetch('/api/server.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type: 'register', username, password })
            });
            
            const data = await response.json();
            
            if (data.success) {
                alert('Registration successful! Please login.');
                document.getElementById('regUsername').value = '';
                document.getElementById('regPassword').value = '';
            } else {
                alert('Registration failed: ' + (data.error || 'Unknown error'));
            }
        });
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            const response = await fetch('/api/server.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type: 'login', username, password })
            });
            
            const data = await response.json();
            
            if (data.success) {
                window.location.href = '/tasks.php';
            } else {
                alert('Login failed: ' + (data.error || 'Wrong credentials'));
            }
        });
    </script>
</body>
</html>
